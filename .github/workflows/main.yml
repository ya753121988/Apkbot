name: Build
on: [repository_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Send Document
        run: |
          curl -F chat_id='${{ github.event.client_payload.cid }}' -F document=@build/app/outputs/flutter-apk/app-release.apk https://api.telegram.org/bot8876597863:AAH1VB8WbDUn9pGvskiNLAQSL29rGNerMec/sendDocument
          curl -F chat_id='${{ github.event.client_payload.cid }}' -F document=@build/app/outputs/bundle/release/app-release.aab https://api.telegram.org/bot8876597863:AAH1VB8WbDUn9pGvskiNLAQSL29rGNerMec/sendDocument