name: Build Android App
on: 
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Name of the app'
      app_url:
        description: 'URL to convert'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install Ionic & Capacitor
        run: npm install -g @ionic/cli @capacitor/core @capacitor/cli

      - name: Create Web Assets
        run: |
          mkdir public
          echo "<html><script>window.location.href='${{ github.event.inputs.app_url }}'</script></html>" > public/index.html

      - name: Capacitor Setup
        run: |
          npx cap init "${{ github.event.inputs.app_name }}" "com.company.myapp" --web-dir public
          npx cap add android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
          ./gradlew bundleRelease # This makes the AAB file for Play Store

      - name: Upload Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
